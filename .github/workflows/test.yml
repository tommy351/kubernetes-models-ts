name: Test
on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/build-packages
      - name: Lint files
        run: pnpm run lint
  go-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-go
      - name: Check go workspace is synced
        shell: bash
        run: |
          set -euo pipefail
          go work sync
          git diff --exit-code
      - name: Check go.mod files are tidy
        shell: bash
        run: |
          set -euo pipefail
          go work edit -json | jq -r '.Use[].DiskPath' | while IFS= read -r dir; do
            echo "::group::go mod tidy -diff ($dir)"
            (cd "$dir" && go mod tidy -diff)
            echo "::endgroup::"
          done
  test:
    runs-on: ubuntu-latest
    needs:
      - lint
    strategy:
      matrix:
        node-version: [22.x, 24.x]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-node
        with:
          node-version: ${{ matrix.node-version }}
      - uses: ./.github/actions/setup-go
      - uses: ./.github/actions/build-packages
      - name: Run unit tests
        run: pnpm run test
