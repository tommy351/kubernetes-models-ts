name: Set up Node.js

inputs:
  node-version:
    description: Node.js version
    required: true
    default: 22.x

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm
        registry-url: https://registry.npmjs.org
    - name: Install dependencies
      shell: bash
      run: pnpm install
